services:
  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    image: anslab/controller
    container_name: anscontroller
    hostname: anscontroller
    volumes:
      - .:/workspace
    networks:
      - ansible_network
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 22), 2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ubuntu:
    build:
      context: .
      dockerfile: ubuntu/Dockerfile
    image: anslab/ubuntu
    container_name: ansubuntu
    hostname: ansubuntu
    networks:
      - ansible_network
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 22), 2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  alpine:
    build:
      context: .
      dockerfile: alpine/Dockerfile
    image: anslab/alpine
    container_name: ansalpine
    hostname: ansalpine
    networks:
      - ansible_network
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 22), 2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  rocky:
    build:
      context: .
      dockerfile: rocky/Dockerfile
    image: anslab/rocky
    container_name: ansrocky
    hostname: ansrocky
    networks:
      - ansible_network
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 22), 2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

networks:
  ansible_network:
    driver: bridge
    name: anslab
